  description: IEEE CIS fraud detection MLOps pipeline
  name: fraud-detection-mlops
root:
  dag:
    tasks:
      condition-1:
        componentRef:
          name: comp-condition-1
        dependentTasks:
        - evaluate-component
        - train-component
        inputs:
          artifacts:
            pipelinechannel--evaluate-component-evaluation_report:
              taskOutputArtifact:
