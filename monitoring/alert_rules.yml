groups:
  - name: fraud-detection-alerts
    rules:
      - alert: FraudRecallLow
        expr: fraud_recall < 0.80
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: Fraud recall has fallen below 0.80
          description: The inference service recall is below the required threshold and should trigger retraining.
      - alert: DataDriftHigh
        expr: data_drift_score > 0.30
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Data drift exceeded the warning threshold
          description: Monitoring detected drift above the configured threshold and retraining should be considered.
      - alert: InferenceLatencyHigh
        expr: histogram_quantile(0.95, sum(rate(fraud_api_request_latency_seconds_bucket[5m])) by (le)) > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Inference latency is above 500ms
          description: The 95th percentile latency for the fraud inference API is above the allowed limit.
