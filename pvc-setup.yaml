apiVersion: v1
kind: Pod
metadata:
  name: pvc-setup
  namespace: kubeflow
spec:
  containers:
  - name: setup
    image: busybox
    command: ['sh', '-c']
    args:
      - |
        # Create data directory
        mkdir -p /mnt/shared/data
        echo "PVC is ready at /mnt/shared/data"
        # Keep pod running briefly so we can copy files
        sleep 30
    volumeMounts:
    - name: pvc
      mountPath: /mnt/shared
  volumes:
  - name: pvc
    persistentVolumeClaim:
      claimName: fraud-detection-pvc
  restartPolicy: Never
