}).to_csv('data/train_transaction.csv', index=False)

pd.DataFrame({
'TransactionID':[1,2,3],
'DeviceType':['desktop','mobile','desktop']
}).to_csv('data/train_identity.csv', index=False)
EOF

```
      python components/data_ingestion.py \
        --transaction-path data/train_transaction.csv \
        --identity-path data/train_identity.csv \
        --output-path outputs/data/raw_data.csv

      python components/data_validation.py \
        --input-path outputs/data/raw_data.csv \
        --output-path outputs/validation_report.txt
```

build:
name: Build
runs-on: ubuntu-latest
needs: ci
if: github.event_name == 'push' && github.ref == 'refs/heads/main'

```
permissions:
  contents: read
  packages: write

steps:
  - uses: actions/checkout@v4

  - name: Login to GHCR
    uses: docker/login-action@v3
    with:
      registry: ghcr.io
      username: ${{ github.actor }}
      password: ${{ secrets.GITHUB_TOKEN }}

  - name: Build & push training image
    uses: docker/build-push-action@v6
    with:
      context: .
      file: Dockerfile
      target: training
      push: true
      tags: ghcr.io/${{ github.repository_owner }}/fraud-detection-training:latest

  - name: Build & push inference image
    uses: docker/build-push-action@v6
    with:
      context: .
      file: Dockerfile
      target: inference
      push: true
      tags: ghcr.io/${{ github.repository_owner }}/fraud-detection-inference:latest
```

cd:
name: CD
runs-on: [self-hosted, Windows, X64]
needs: build
if: github.event_name == 'push' && github.ref == 'refs/heads/main'

```
