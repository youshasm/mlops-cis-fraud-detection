apiVersion: v1
kind: PersistentVolumeClaim
metadata:
name: fraud-detection-pvc
namespace: kubeflow
spec:
accessModes:
- ReadWriteOnce
resources:
requests:
storage: 10Gi
"@
$yaml | kubectl apply -f -
}

```
      python pipeline/kubeflow_pipeline.py --output-path outputs/pipeline.yaml

  - name: Trigger Kubeflow pipeline
    shell: pwsh
    env:
      KUBEFLOW_HOST: ${{ secrets.KUBEFLOW_HOST }}
      KUBEFLOW_TOKEN: ${{ secrets.KUBEFLOW_TOKEN }}
    run: |
      $hostUrl = $env:KUBEFLOW_HOST
      if (-not $hostUrl) { $hostUrl = "http://127.0.0.1:8080" }

      $pf = Start-Process kubectl -ArgumentList "port-forward svc/ml-pipeline-ui -n kubeflow 8080:80" -PassThru -WindowStyle Hidden

      $ready = $false
      for ($i = 0; $i -lt 20; $i++) {
        try {
          Invoke-WebRequest "http://127.0.0.1:8080" -TimeoutSec 2 | Out-Null
          $ready = $true
          break
        } catch { Start-Sleep 1 }
      }

      if (-not $ready) {
        if ($pf -and -not $pf.HasExited) { Stop-Process $pf.Id -Force }
        throw "Kubeflow not reachable"
      }

      python -c "import os; from kfp import Client; host=os.getenv('KUBEFLOW_HOST') or 'http://127.0.0.1:8080'; token=os.getenv('KUBEFLOW_TOKEN'); client=Client(host=host, existing_token=token) if token else Client(host=host); client.create_run_from_pipeline_package('outputs/pipeline.yaml', arguments={'transaction_path':'data/train_transaction.csv','identity_path':'data/train_identity.csv','namespace':'fraud-detection'}, namespace='fraud-detection')"

      if ($pf -and -not $pf.HasExited) { Stop-Process $pf.Id -Force }
```

