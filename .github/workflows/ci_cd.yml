name: fraud-detection-mlops

on:
push:
pull_request:
repository_dispatch:
types:
- fraud_recall_drop
- fraud_drift_exceeded
workflow_dispatch:

jobs:
ci:
name: CI
runs-on: ubuntu-latest
env:
PYTHONPATH: ${{ github.workspace }}
if: github.event_name == 'push' || github.event_name == 'pull_request'

```
steps:
  - uses: actions/checkout@v4

  - name: Set PYTHONPATH
    run: echo "PYTHONPATH=${{ github.workspace }}" >> $GITHUB_ENV

  - uses: actions/setup-python@v5
    with:
      python-version: '3.10'

  - name: Install deps
    run: |
      python -m pip install --upgrade pip
      pip install -r requirements.txt

  - name: Lint
    run: |
      flake8 components pipeline drift retraining api tests \
        --extend-ignore=E501,F401,F541,F824,E203,W292

  - name: Debug imports
    run: |
      python -c "import sys; print('\n'.join(sys.path))"
      python -c "import components; print('components OK')" || echo "components import failed"

  - name: Test
    run: python -m pytest tests/ -v

  - name: Schema validation
    run: |
      python - <<EOF
```

import os, pandas as pd
os.makedirs('data', exist_ok=True)

pd.DataFrame({
